<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Dono — Barber & Studio FX</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: #0d0d0d;
        color: #fff;
        min-height: 100vh;
        padding: 24px 16px;
      }
      .login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .login-card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 16px;
        padding: 32px 24px;
        width: 100%;
        max-width: 360px;
        text-align: center;
      }
      .login-logo {
        width: 56px;
        height: 56px;
        background: #d4a017;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 18px;
        color: #111;
        margin: 0 auto 16px;
      }
      .login-titulo {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 6px;
      }
      .login-sub {
        font-size: 13px;
        color: #888;
        margin-bottom: 24px;
      }
      .login-input {
        width: 100%;
        background: #222;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 13px 14px;
        font-size: 15px;
        color: #fff;
        outline: none;
        font-family: inherit;
        text-align: center;
        letter-spacing: 2px;
        margin-bottom: 12px;
        transition: border-color 0.15s;
      }
      .login-input:focus {
        border-color: #d4a017;
      }
      .login-input::placeholder {
        letter-spacing: 0;
        color: #555;
      }
      .login-btn {
        width: 100%;
        background: #d4a017;
        color: #111;
        border: none;
        border-radius: 10px;
        padding: 14px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
      }
      .login-btn:hover {
        background: #b8891a;
      }
      .login-erro {
        color: #e63946;
        font-size: 13px;
        margin-top: 10px;
        display: none;
      }
      .painel-screen {
        display: none;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #111;
        border-radius: 12px;
        padding: 16px 20px;
        margin-bottom: 20px;
        max-width: 700px;
        margin-left: auto;
        margin-right: auto;
      }
      .header-esq {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo {
        width: 42px;
        height: 42px;
        background: #d4a017;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 14px;
        color: #111;
      }
      .header h1 {
        font-size: 15px;
        font-weight: 600;
      }
      .header p {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }
      .btn-sair {
        background: transparent;
        border: 1px solid #333;
        color: #888;
        border-radius: 8px;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
      }
      .btn-sair:hover {
        color: #fff;
        border-color: #555;
      }
      .container {
        max-width: 700px;
        margin: 0 auto;
      }
      .resumo-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 20px;
      }
      .resumo-card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 14px;
        text-align: center;
      }
      .resumo-card .periodo {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      .resumo-card .valor {
        font-size: 20px;
        font-weight: 700;
        color: #d4a017;
        margin-bottom: 4px;
      }
      .resumo-card .qtd {
        font-size: 12px;
        color: #555;
      }
      .secao-titulo {
        font-size: 13px;
        color: #888;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
      }
      .vazio {
        text-align: center;
        padding: 48px 20px;
        background: #1a1a1a;
        border-radius: 12px;
        color: #555;
        font-size: 14px;
      }
      .vazio span {
        font-size: 32px;
        display: block;
        margin-bottom: 10px;
      }
      .agendamento-card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 10px;
      }
      .agendamento-card.confirmado {
        border-color: #1a7a3a;
        background: #0f1f15;
      }
      .agendamento-card.cancelado {
        border-color: #7a1a1a;
        background: #1f0f0f;
        opacity: 0.6;
      }
      .card-topo {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .cliente-nome {
        font-size: 15px;
        font-weight: 600;
        color: #fff;
      }
      .cliente-tel {
        font-size: 12px;
        color: #888;
      }
      .status {
        font-size: 11px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 20px;
        text-transform: uppercase;
      }
      .status.pendente {
        background: #2a2000;
        color: #d4a017;
      }
      .status.confirmado {
        background: #0f2a1a;
        color: #25d366;
      }
      .status.cancelado {
        background: #2a0f0f;
        color: #e63946;
      }
      .card-detalhes {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .detalhe-chip {
        background: #222;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 12px;
        color: #ccc;
      }
      .detalhe-chip strong {
        color: #d4a017;
      }
      .card-acoes {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .btn-confirmar {
        flex: 1;
        background: #0f2a1a;
        border: 1px solid #1a7a3a;
        color: #25d366;
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        min-width: 100px;
      }
      .btn-confirmar:hover {
        background: #1a3a25;
      }
      .btn-cancelar {
        flex: 1;
        background: #2a0f0f;
        border: 1px solid #7a1a1a;
        color: #e63946;
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        min-width: 100px;
      }
      .btn-cancelar:hover {
        background: #3a1515;
      }
      .btn-whatsapp {
        flex: 1;
        background: #0a2a15;
        border: 1px solid #25d366;
        color: #25d366;
        border-radius: 8px;
        padding: 10px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        min-width: 100px;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .btn-whatsapp:hover {
        background: #0f3a1f;
      }
      .btn-confirmar:disabled,
      .btn-cancelar:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .btn-atualizar {
        width: 100%;
        background: #222;
        border: 1px solid #333;
        color: #888;
        border-radius: 10px;
        padding: 12px;
        font-size: 14px;
        cursor: pointer;
        font-family: inherit;
        margin-top: 16px;
      }
      .btn-atualizar:hover {
        color: #fff;
        border-color: #555;
      }
      .link-cliente {
        text-align: center;
        margin-top: 16px;
        font-size: 13px;
        color: #555;
      }
      .link-cliente a {
        color: #d4a017;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <!-- LOGIN -->
    <div class="login-screen" id="login-screen">
      <div class="login-card">
        <div class="login-logo">FX</div>
        <div class="login-titulo">Painel do Dono</div>
        <div class="login-sub">Barber &amp; Studio FX</div>
        <input
          class="login-input"
          id="campo-senha"
          type="password"
          placeholder="Digite a senha"
          onkeydown="if (event.key === 'Enter') fazerLogin();"
        />
        <button class="login-btn" onclick="fazerLogin()">Entrar</button>
        <div class="login-erro" id="erro-login">
          Senha incorreta. Tente novamente.
        </div>
      </div>
    </div>

    <!-- PAINEL -->
    <div class="painel-screen" id="painel-screen">
      <div class="header">
        <div class="header-esq">
          <div class="logo">FX</div>
          <div>
            <h1>Painel do Dono</h1>
            <p>Barber &amp; Studio FX</p>
          </div>
        </div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>

      <div class="container">
        <div class="resumo-grid">
          <div class="resumo-card">
            <div class="periodo">Hoje</div>
            <div class="valor" id="valor-hoje">R$ 0</div>
            <div class="qtd" id="qtd-hoje">0 confirmados</div>
          </div>
          <div class="resumo-card">
            <div class="periodo">Semana</div>
            <div class="valor" id="valor-semana">R$ 0</div>
            <div class="qtd" id="qtd-semana">0 confirmados</div>
          </div>
          <div class="resumo-card">
            <div class="periodo">Mês</div>
            <div class="valor" id="valor-mes">R$ 0</div>
            <div class="qtd" id="qtd-mes">0 confirmados</div>
          </div>
        </div>

        <div class="secao-titulo">Agendamentos</div>
        <div id="lista-agendamentos">
          <div class="vazio"><span>📋</span>Carregando...</div>
        </div>

        <button class="btn-atualizar" onclick="carregarAgendamentos()">
          🔄 Atualizar lista
        </button>
        <div class="link-cliente">
          <a href="/agendamento.html" target="_blank"
            >→ Abrir tela do cliente</a
          >
        </div>
      </div>
    </div>

    <script>
      var SENHA = "barberstudiofx";

      function fazerLogin() {
        var senha = document.getElementById("campo-senha").value;
        if (senha === SENHA) {
          document.getElementById("login-screen").style.display = "none";
          document.getElementById("painel-screen").style.display = "block";
          carregarAgendamentos();
        } else {
          document.getElementById("erro-login").style.display = "block";
          document.getElementById("campo-senha").value = "";
        }
      }

      function sair() {
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("painel-screen").style.display = "none";
        document.getElementById("campo-senha").value = "";
        document.getElementById("erro-login").style.display = "none";
      }

      function extrairValor(preco) {
        if (!preco) return 0;
        return parseInt(preco.replace(/[^\d]/g, "")) || 0;
      }

      function ehHoje(ts) {
        var a = new Date(),
          d = new Date(ts);
        return (
          d.getDate() === a.getDate() &&
          d.getMonth() === a.getMonth() &&
          d.getFullYear() === a.getFullYear()
        );
      }
      function ehEstaSemana(ts) {
        var a = new Date(),
          d = new Date(ts),
          i = new Date(a);
        i.setDate(a.getDate() - a.getDay());
        i.setHours(0, 0, 0, 0);
        return d >= i;
      }
      function ehEsteMes(ts) {
        var a = new Date(),
          d = new Date(ts);
        return (
          d.getMonth() === a.getMonth() && d.getFullYear() === a.getFullYear()
        );
      }

      function atualizarResumo(agendamentos) {
        var conf = agendamentos.filter(function (ag) {
          return ag.status === "confirmado";
        });
        var hoje = conf.filter(function (ag) {
          return ehHoje(ag.id);
        });
        var sem = conf.filter(function (ag) {
          return ehEstaSemana(ag.id);
        });
        var mes = conf.filter(function (ag) {
          return ehEsteMes(ag.id);
        });
        document.getElementById("valor-hoje").textContent =
          "R$ " +
          hoje.reduce(function (a, ag) {
            return a + extrairValor(ag.preco);
          }, 0);
        document.getElementById("valor-semana").textContent =
          "R$ " +
          sem.reduce(function (a, ag) {
            return a + extrairValor(ag.preco);
          }, 0);
        document.getElementById("valor-mes").textContent =
          "R$ " +
          mes.reduce(function (a, ag) {
            return a + extrairValor(ag.preco);
          }, 0);
        document.getElementById("qtd-hoje").textContent =
          hoje.length + " confirmado" + (hoje.length !== 1 ? "s" : "");
        document.getElementById("qtd-semana").textContent =
          sem.length + " confirmado" + (sem.length !== 1 ? "s" : "");
        document.getElementById("qtd-mes").textContent =
          mes.length + " confirmado" + (mes.length !== 1 ? "s" : "");
      }

      // Gera o link do WhatsApp com a mensagem já escrita
      function gerarLinkWhatsApp(ag) {
        var tel = ag.telefone.replace(/[^\d]/g, "");
        // Adiciona 55 (Brasil) se não tiver
        if (tel.length === 11) tel = "55" + tel;
        var msg =
          "Olá " +
          ag.nome +
          "! ✅ Seu agendamento está confirmado:\n\n" +
          "✂️ Serviço: " +
          ag.servico +
          "\n" +
          "💈 Profissional: " +
          (ag.profissional || "A definir") +
          "\n" +
          "📅 Data: " +
          ag.dia +
          "\n" +
          "🕐 Horário: " +
          ag.hora +
          "\n\n" +
          "Te esperamos na Barber & Studio FX! 🔥";
        return "https://wa.me/" + tel + "?text=" + encodeURIComponent(msg);
      }

      function carregarAgendamentos() {
        document.getElementById("lista-agendamentos").innerHTML =
          '<div class="vazio"><span>⏳</span>Carregando...</div>';
        fetch("/api/agendamentos")
          .then(function (r) {
            return r.json();
          })
          .then(function (agendamentos) {
            atualizarResumo(agendamentos);
            if (agendamentos.length === 0) {
              document.getElementById("lista-agendamentos").innerHTML =
                '<div class="vazio"><span>📋</span>Nenhum agendamento ainda.</div>';
              return;
            }
            var html = "";
            agendamentos.forEach(function (ag) {
              var statusClasse = ag.status || "pendente";
              var statusTexto =
                statusClasse === "confirmado"
                  ? "✓ Confirmado"
                  : statusClasse === "cancelado"
                    ? "✗ Cancelado"
                    : "⏳ Pendente";
              var desabilitado = statusClasse !== "pendente" ? "disabled" : "";
              var horario = ag.id
                ? new Date(ag.id).toLocaleTimeString("pt-BR", {
                    hour: "2-digit",
                    minute: "2-digit",
                  })
                : "";
              var linkWpp = gerarLinkWhatsApp(ag);

              html +=
                '<div class="agendamento-card ' +
                statusClasse +
                '" id="card-' +
                ag.id +
                '">' +
                '<div class="card-topo"><div><div class="cliente-nome">' +
                ag.nome +
                '</div><div class="cliente-tel">' +
                ag.telefone +
                "</div></div>" +
                '<span class="status ' +
                statusClasse +
                '" id="status-' +
                ag.id +
                '">' +
                statusTexto +
                "</span></div>" +
                '<div class="card-detalhes">' +
                '<div class="detalhe-chip"><strong>Serviço:</strong> ' +
                ag.servico +
                "</div>" +
                (ag.profissional
                  ? '<div class="detalhe-chip"><strong>Prof:</strong> ' +
                    ag.profissional +
                    "</div>"
                  : "") +
                '<div class="detalhe-chip"><strong>Data:</strong> ' +
                ag.dia +
                "</div>" +
                '<div class="detalhe-chip"><strong>Hora:</strong> ' +
                ag.hora +
                "</div>" +
                '<div class="detalhe-chip"><strong>Valor:</strong> ' +
                ag.preco +
                "</div>" +
                (horario
                  ? '<div class="detalhe-chip"><strong>Recebido:</strong> ' +
                    horario +
                    "</div>"
                  : "") +
                "</div>" +
                '<div class="card-acoes">' +
                '<button class="btn-confirmar" onclick="atualizarStatus(' +
                ag.id +
                ", 'confirmado')\" " +
                desabilitado +
                ">✓ Confirmar</button>" +
                '<button class="btn-cancelar" onclick="atualizarStatus(' +
                ag.id +
                ", 'cancelado')\" " +
                desabilitado +
                ">✗ Cancelar</button>" +
                '<a class="btn-whatsapp" href="' +
                linkWpp +
                '" target="_blank">📱 WhatsApp</a>' +
                "</div></div>";
            });
            document.getElementById("lista-agendamentos").innerHTML = html;
          })
          .catch(function () {
            document.getElementById("lista-agendamentos").innerHTML =
              '<div class="vazio"><span>⚠️</span>Erro ao carregar.</div>';
          });
      }

      function atualizarStatus(id, novoStatus) {
        fetch("/api/agendamentos/" + id, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status: novoStatus }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (resultado) {
            if (resultado.sucesso) {
              var card = document.getElementById("card-" + id);
              var status = document.getElementById("status-" + id);
              card.classList.remove("pendente", "confirmado", "cancelado");
              card.classList.add(novoStatus);
              status.className = "status " + novoStatus;
              status.textContent =
                novoStatus === "confirmado" ? "✓ Confirmado" : "✗ Cancelado";
              card
                .querySelectorAll(".btn-confirmar, .btn-cancelar")
                .forEach(function (btn) {
                  btn.disabled = true;
                });
              carregarAgendamentos();
            }
          });
      }
    </script>
  </body>
</html>
