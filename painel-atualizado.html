<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel do Dono - Barber &amp; Studio FX</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background:
          radial-gradient(
            circle at top,
            rgba(212, 160, 23, 0.12),
            transparent 35%
          ),
          linear-gradient(135deg, #070707, #16130d 55%, #080808);
        color: #f7f1e8;
        min-height: 100vh;
        padding: 24px 16px;
      }
      .login-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .login-card {
        background: rgba(20, 20, 20, 0.98);
        border: 1px solid rgba(212, 160, 23, 0.2);
        border-radius: 16px;
        padding: 32px 24px;
        width: 100%;
        max-width: 380px;
        text-align: center;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
      }
      .login-logo,
      .logo {
        background: linear-gradient(135deg, #f2c14e, #b98218);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: #111;
      }
      .login-logo {
        width: 58px;
        height: 58px;
        font-size: 18px;
        margin: 0 auto 16px;
      }
      .login-titulo {
        font-size: 20px;
        font-weight: 800;
        color: #fff;
        margin-bottom: 6px;
      }
      .login-sub {
        font-size: 13px;
        color: #a9a096;
        margin-bottom: 24px;
      }
      .login-input,
      .campo-config {
        width: 100%;
        background: #202020;
        border: 1px solid #3a352d;
        border-radius: 10px;
        padding: 13px 14px;
        font-size: 15px;
        color: #fff;
        outline: none;
        font-family: inherit;
      }
      .login-input {
        text-align: center;
        letter-spacing: 2px;
        margin-bottom: 12px;
      }
      .login-input:focus,
      .campo-config:focus {
        border-color: #d4a017;
      }
      .login-input::placeholder,
      .campo-config::placeholder {
        color: #70675c;
        letter-spacing: 0;
      }
      .login-btn,
      .btn-principal {
        width: 100%;
        background: linear-gradient(135deg, #f2c14e, #b98218);
        color: #111;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
        font-family: inherit;
      }
      .login-erro {
        color: #ff5c5c;
        font-size: 13px;
        margin-top: 10px;
        display: none;
      }
      .painel-screen {
        display: none;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(17, 17, 17, 0.96);
        border: 1px solid rgba(212, 160, 23, 0.18);
        border-radius: 14px;
        padding: 16px 20px;
        margin: 0 auto 20px;
        max-width: 820px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.25);
      }
      .header-esq {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo {
        width: 42px;
        height: 42px;
        font-size: 14px;
      }
      .header h1 {
        font-size: 16px;
        font-weight: 800;
      }
      .header p {
        font-size: 12px;
        color: #a9a096;
        margin-top: 2px;
      }
      .btn-sair {
        background: transparent;
        border: 1px solid #3a352d;
        color: #a9a096;
        border-radius: 9px;
        padding: 8px 13px;
        font-size: 12px;
        cursor: pointer;
        font-family: inherit;
      }
      .btn-sair:hover {
        color: #fff;
        border-color: #625643;
      }
      .container {
        max-width: 820px;
        margin: 0 auto;
      }
      .resumo-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-bottom: 22px;
      }
      .resumo-card,
      .agendamento-card,
      .profissional-form,
      .vazio {
        background: rgba(20, 20, 20, 0.98);
        border: 1px solid #3a352d;
        border-radius: 12px;
      }
      .resumo-card {
        padding: 15px;
        text-align: center;
      }
      .resumo-card .periodo {
        font-size: 11px;
        color: #a9a096;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 6px;
      }
      .resumo-card .valor {
        font-size: 21px;
        font-weight: 800;
        color: #f2c14e;
        margin-bottom: 4px;
      }
      .resumo-card .qtd {
        font-size: 12px;
        color: #70675c;
      }
      .secao-titulo {
        font-size: 13px;
        color: #d4a017;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        margin: 22px 0 12px;
      }
      .vazio {
        text-align: center;
        padding: 36px 20px;
        color: #70675c;
        font-size: 14px;
      }
      .profissional-form {
        display: grid;
        grid-template-columns: 1fr 2fr auto;
        gap: 8px;
        padding: 12px;
        margin-bottom: 9px;
      }
      .btn-remover,
      .btn-cancelar {
        background: #2a0f0f;
        border: 1px solid #7a1a1a;
        color: #ff5c5c;
        border-radius: 9px;
        padding: 10px 12px;
        cursor: pointer;
        font-family: inherit;
        font-weight: 700;
      }
      .btn-adicionar,
      .btn-atualizar {
        width: 100%;
        background: #202020;
        border: 1px solid #3a352d;
        color: #a9a096;
        border-radius: 12px;
        padding: 12px;
        font-size: 14px;
        cursor: pointer;
        font-family: inherit;
        margin-top: 9px;
      }
      .btn-adicionar:hover,
      .btn-atualizar:hover {
        color: #fff;
        border-color: #625643;
      }
      .agendamento-card {
        padding: 16px;
        margin-bottom: 10px;
      }
      .agendamento-card.confirmado {
        border-color: #1a7a3a;
        background: #0f1f15;
      }
      .agendamento-card.cancelado {
        border-color: #7a1a1a;
        background: #1f0f0f;
        opacity: 0.7;
      }
      .card-topo {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .cliente-nome {
        font-size: 15px;
        font-weight: 800;
        color: #fff;
      }
      .cliente-tel {
        font-size: 12px;
        color: #a9a096;
        margin-top: 2px;
      }
      .status {
        font-size: 11px;
        font-weight: 800;
        padding: 5px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .status.pendente {
        background: #2a2000;
        color: #f2c14e;
      }
      .status.confirmado {
        background: #0f2a1a;
        color: #25d366;
      }
      .status.cancelado {
        background: #2a0f0f;
        color: #ff5c5c;
      }
      .card-detalhes {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .detalhe-chip {
        background: #202020;
        border: 1px solid #3a352d;
        border-radius: 7px;
        padding: 6px 10px;
        font-size: 12px;
        color: #d7d0c6;
      }
      .detalhe-chip strong {
        color: #f2c14e;
      }
      .card-acoes {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .btn-confirmar,
      .btn-whatsapp {
        flex: 1;
        border-radius: 9px;
        padding: 10px;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        font-family: inherit;
        min-width: 110px;
        text-align: center;
        text-decoration: none;
      }
      .btn-confirmar {
        background: #0f2a1a;
        border: 1px solid #1a7a3a;
        color: #25d366;
      }
      .btn-cancelar {
        flex: 1;
        min-width: 110px;
      }
      .btn-whatsapp {
        background: #0a2a15;
        border: 1px solid #25d366;
        color: #25d366;
      }
      .btn-confirmar:disabled,
      .btn-cancelar:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .link-cliente {
        text-align: center;
        margin-top: 16px;
        font-size: 13px;
        color: #70675c;
      }
      .link-cliente a {
        color: #f2c14e;
        text-decoration: none;
      }
      @media (max-width: 700px) {
        .resumo-grid {
          grid-template-columns: 1fr;
        }
        .profissional-form {
          grid-template-columns: 1fr;
        }
        .header {
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-screen" id="login-screen">
      <div class="login-card">
        <div class="login-logo">FX</div>
        <div class="login-titulo">Painel do Dono</div>
        <div class="login-sub">Barber &amp; Studio FX</div>
        <input
          class="login-input"
          id="campo-senha"
          type="password"
          placeholder="Digite a senha"
          onkeydown="if (event.key === 'Enter') fazerLogin();"
        />
        <button class="login-btn" onclick="fazerLogin()">Entrar</button>
        <div class="login-erro" id="erro-login">
          Senha incorreta. Tente novamente.
        </div>
      </div>
    </div>

    <div class="painel-screen" id="painel-screen">
      <div class="header">
        <div class="header-esq">
          <div class="logo">FX</div>
          <div>
            <h1>Painel do Dono</h1>
            <p>Barber &amp; Studio FX</p>
          </div>
        </div>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>

      <div class="container">
        <div class="resumo-grid">
          <div class="resumo-card">
            <div class="periodo">Hoje</div>
            <div class="valor" id="valor-hoje">R$ 0</div>
            <div class="qtd" id="qtd-hoje">0 confirmados</div>
          </div>
          <div class="resumo-card">
            <div class="periodo">Semana</div>
            <div class="valor" id="valor-semana">R$ 0</div>
            <div class="qtd" id="qtd-semana">0 confirmados</div>
          </div>
          <div class="resumo-card">
            <div class="periodo">Mes</div>
            <div class="valor" id="valor-mes">R$ 0</div>
            <div class="qtd" id="qtd-mes">0 confirmados</div>
          </div>
        </div>

        <div class="secao-titulo">Profissionais</div>
        <div id="lista-profissionais"></div>
        <button class="btn-adicionar" onclick="adicionarProfissional()">
          Adicionar profissional
        </button>
        <button
          class="btn-principal"
          style="margin-top: 9px"
          onclick="salvarProfissionais()"
        >
          Salvar profissionais
        </button>

        <div class="secao-titulo">Agendamentos</div>
        <div id="lista-agendamentos">
          <div class="vazio">Carregando...</div>
        </div>

        <button class="btn-atualizar" onclick="carregarAgendamentos()">
          Atualizar lista
        </button>
        <div class="link-cliente">
          <a href="/agendamento.html" target="_blank">Abrir tela do cliente</a>
        </div>
      </div>
    </div>

    <script>
      var API_BASE = "https://barber-production.up.railway.app"; // Se usar GitHub Pages, coloque aqui a URL do Railway. Ex: "https://seu-app.up.railway.app"
      var adminToken = localStorage.getItem("adminToken") || "";
      var profissionaisConfig = [];

      function adminHeaders() {
        return {
          "Content-Type": "application/json",
          Authorization: "Bearer " + adminToken,
        };
      }

      function mostrarPainel() {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("painel-screen").style.display = "block";
        carregarAgendamentos();
        carregarConfigProfissionais();
      }

      function fazerLogin() {
        var senha = document.getElementById("campo-senha").value;
        fetch(API_BASE + "/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ senha: senha }),
        })
          .then(function (r) {
            if (!r.ok) throw new Error("login");
            return r.json();
          })
          .then(function (resultado) {
            adminToken = resultado.token;
            localStorage.setItem("adminToken", adminToken);
            mostrarPainel();
          })
          .catch(function () {
            document.getElementById("erro-login").style.display = "block";
            document.getElementById("campo-senha").value = "";
          });
      }

      function sair() {
        fetch(API_BASE + "/api/admin/logout", {
          method: "POST",
          headers: adminHeaders(),
        }).finally(function () {
          adminToken = "";
          localStorage.removeItem("adminToken");
          document.getElementById("login-screen").style.display = "flex";
          document.getElementById("painel-screen").style.display = "none";
          document.getElementById("campo-senha").value = "";
        });
      }

      function renderizarProfissionaisConfig() {
        var lista = document.getElementById("lista-profissionais");
        lista.innerHTML = "";

        profissionaisConfig.forEach(function (profissional, index) {
          var linha = document.createElement("div");
          linha.className = "profissional-form";
          linha.innerHTML =
            '<input class="campo-config" placeholder="Nome" value="' +
            escapar(profissional.nome) +
            '" oninput="profissionaisConfig[' +
            index +
            '].nome = this.value">' +
            '<input class="campo-config" placeholder="URL da foto" value="' +
            escapar(profissional.fotoUrl) +
            '" oninput="profissionaisConfig[' +
            index +
            '].fotoUrl = this.value">' +
            '<button class="btn-remover" onclick="removerProfissional(' +
            index +
            ')">Remover</button>';
          lista.appendChild(linha);
        });
      }

      function carregarConfigProfissionais() {
        fetch(API_BASE + "/api/profissionais")
          .then(function (r) {
            return r.json();
          })
          .then(function (lista) {
            profissionaisConfig = lista;
            renderizarProfissionaisConfig();
          });
      }

      function adicionarProfissional() {
        profissionaisConfig.push({
          id: String(Date.now()),
          nome: "",
          fotoUrl: "",
        });
        renderizarProfissionaisConfig();
      }

      function removerProfissional(index) {
        profissionaisConfig.splice(index, 1);
        renderizarProfissionaisConfig();
      }

      function salvarProfissionais() {
        fetch(API_BASE + "/api/profissionais", {
          method: "PUT",
          headers: adminHeaders(),
          body: JSON.stringify({ profissionais: profissionaisConfig }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (resultado) {
            profissionaisConfig =
              resultado.profissionais || profissionaisConfig;
            renderizarProfissionaisConfig();
            alert("Profissionais salvos.");
          });
      }

      function escapar(valor) {
        return String(valor || "")
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function extrairValor(preco) {
        if (!preco) return 0;
        return parseInt(String(preco).replace(/[^\d]/g, ""), 10) || 0;
      }

      function ehHoje(ts) {
        var a = new Date();
        var d = new Date(ts);
        return (
          d.getDate() === a.getDate() &&
          d.getMonth() === a.getMonth() &&
          d.getFullYear() === a.getFullYear()
        );
      }

      function ehEstaSemana(ts) {
        var a = new Date();
        var d = new Date(ts);
        var inicio = new Date(a);
        inicio.setDate(a.getDate() - a.getDay());
        inicio.setHours(0, 0, 0, 0);
        return d >= inicio;
      }

      function ehEsteMes(ts) {
        var a = new Date();
        var d = new Date(ts);
        return (
          d.getMonth() === a.getMonth() && d.getFullYear() === a.getFullYear()
        );
      }

      function atualizarResumo(agendamentos) {
        var conf = agendamentos.filter(function (ag) {
          return ag.status === "confirmado";
        });
        var hoje = conf.filter(function (ag) {
          return ehHoje(ag.id);
        });
        var sem = conf.filter(function (ag) {
          return ehEstaSemana(ag.id);
        });
        var mes = conf.filter(function (ag) {
          return ehEsteMes(ag.id);
        });
        document.getElementById("valor-hoje").textContent =
          "R$ " +
          hoje.reduce(function (a, ag) {
            return a + extrairValor(ag.preco);
          }, 0);
        document.getElementById("valor-semana").textContent =
          "R$ " +
          sem.reduce(function (a, ag) {
            return a + extrairValor(ag.preco);
          }, 0);
        document.getElementById("valor-mes").textContent =
          "R$ " +
          mes.reduce(function (a, ag) {
            return a + extrairValor(ag.preco);
          }, 0);
        document.getElementById("qtd-hoje").textContent =
          hoje.length + " confirmado" + (hoje.length !== 1 ? "s" : "");
        document.getElementById("qtd-semana").textContent =
          sem.length + " confirmado" + (sem.length !== 1 ? "s" : "");
        document.getElementById("qtd-mes").textContent =
          mes.length + " confirmado" + (mes.length !== 1 ? "s" : "");
      }

      function gerarLinkWhatsApp(ag) {
        var tel = String(ag.telefone || "").replace(/[^\d]/g, "");
        if (tel.length === 11) tel = "55" + tel;
        var msg =
          "Ola " +
          ag.nome +
          "! Seu agendamento esta confirmado:\n\n" +
          "Servico: " +
          ag.servico +
          "\n" +
          "Profissional: " +
          (ag.profissional || "A definir") +
          "\n" +
          "Data: " +
          ag.dia +
          "\n" +
          "Horario: " +
          ag.hora +
          "\n\n" +
          "Te esperamos na Barber & Studio FX!";
        return "https://wa.me/" + tel + "?text=" + encodeURIComponent(msg);
      }

      function carregarAgendamentos() {
        document.getElementById("lista-agendamentos").innerHTML =
          '<div class="vazio">Carregando...</div>';
        fetch(API_BASE + "/api/agendamentos", { headers: adminHeaders() })
          .then(function (r) {
            if (!r.ok) throw new Error("auth");
            return r.json();
          })
          .then(function (agendamentos) {
            atualizarResumo(agendamentos);
            if (agendamentos.length === 0) {
              document.getElementById("lista-agendamentos").innerHTML =
                '<div class="vazio">Nenhum agendamento ainda.</div>';
              return;
            }

            var html = "";
            agendamentos.forEach(function (ag) {
              var statusClasse = ag.status || "pendente";
              var statusTexto =
                statusClasse === "confirmado"
                  ? "Confirmado"
                  : statusClasse === "cancelado"
                    ? "Cancelado"
                    : "Pendente";
              var desabilitado = statusClasse !== "pendente" ? "disabled" : "";
              var horario = ag.id
                ? new Date(ag.id).toLocaleTimeString("pt-BR", {
                    hour: "2-digit",
                    minute: "2-digit",
                  })
                : "";
              var linkWpp = gerarLinkWhatsApp(ag);

              html +=
                '<div class="agendamento-card ' +
                statusClasse +
                '" id="card-' +
                ag.id +
                '">' +
                '<div class="card-topo"><div><div class="cliente-nome">' +
                escapar(ag.nome) +
                '</div><div class="cliente-tel">' +
                escapar(ag.telefone) +
                "</div></div>" +
                '<span class="status ' +
                statusClasse +
                '" id="status-' +
                ag.id +
                '">' +
                statusTexto +
                "</span></div>" +
                '<div class="card-detalhes">' +
                '<div class="detalhe-chip"><strong>Servico:</strong> ' +
                escapar(ag.servico) +
                "</div>" +
                '<div class="detalhe-chip"><strong>Prof:</strong> ' +
                escapar(ag.profissional || "A definir") +
                "</div>" +
                '<div class="detalhe-chip"><strong>Data:</strong> ' +
                escapar(ag.dia) +
                "</div>" +
                '<div class="detalhe-chip"><strong>Hora:</strong> ' +
                escapar(ag.hora) +
                "</div>" +
                '<div class="detalhe-chip"><strong>Valor:</strong> ' +
                escapar(ag.preco) +
                "</div>" +
                (horario
                  ? '<div class="detalhe-chip"><strong>Recebido:</strong> ' +
                    horario +
                    "</div>"
                  : "") +
                "</div>" +
                '<div class="card-acoes">' +
                '<button class="btn-confirmar" onclick="atualizarStatus(' +
                ag.id +
                ", 'confirmado')\" " +
                desabilitado +
                ">Confirmar</button>" +
                '<button class="btn-cancelar" onclick="atualizarStatus(' +
                ag.id +
                ", 'cancelado')\" " +
                desabilitado +
                ">Cancelar</button>" +
                '<a class="btn-whatsapp" href="' +
                linkWpp +
                '" target="_blank">WhatsApp</a>' +
                "</div></div>";
            });
            document.getElementById("lista-agendamentos").innerHTML = html;
          })
          .catch(function () {
            localStorage.removeItem("adminToken");
            document.getElementById("login-screen").style.display = "flex";
            document.getElementById("painel-screen").style.display = "none";
            document.getElementById("lista-agendamentos").innerHTML =
              '<div class="vazio">Erro ao carregar.</div>';
          });
      }

      function atualizarStatus(id, novoStatus) {
        fetch(API_BASE + "/api/agendamentos/" + id, {
          method: "PATCH",
          headers: adminHeaders(),
          body: JSON.stringify({ status: novoStatus }),
        })
          .then(function (r) {
            return r.json();
          })
          .then(function (resultado) {
            if (resultado.sucesso) carregarAgendamentos();
          });
      }

      if (adminToken) mostrarPainel();
    </script>
  </body>
</html>
